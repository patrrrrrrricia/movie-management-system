spring.application.name=demo
spring.datasource.url=jdbc:mysql://localhost:3306/Patricia?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

#Ruleaza schema.sql pe MySQL
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

#Ca sa nu incerce Hibernate sa creeze/strice schema
spring.jpa.hibernate.ddl-auto=none

#(optional) pt a vedea ce se intampla
spring.jpa.show-sql=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG
