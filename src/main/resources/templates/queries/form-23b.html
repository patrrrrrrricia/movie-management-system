<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/images/director.png}">
    <title>02.03.b - Cautare Persoane</title>
</head>
<body>
<div class="container">
    <h2>02.03.b - Cautare Persoane</h2>
    <div class="student-info">Filtrare dupa initiala nume si domeniu email</div>

    <form th:action="@{/executa-23b}" method="get">
        <input type="text" name="litera" placeholder="Inițiala nume (ex: P)" maxlength="1" required
               style="padding: 12px; width: 80%; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 10px;">

        <input type="text" name="domeniu" placeholder="Domeniu email (ex: com)" required
               style="padding: 12px; width: 80%; border-radius: 10px; border: 1px solid #ffccd5; margin-bottom: 20px;">

        <button type="submit" class="btn-table" style="cursor:pointer; width: 100%;">Cauta Persoane</button>
    </form>

    <br>
    <a th:href="@{/}" class="btn-table" style="background-color: #fce4ec; color: #d81b60;">Inapoi la Meniu</a>
</div>
</body>
</html>
